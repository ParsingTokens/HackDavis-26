services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: thermal_routing_db
    environment:
      POSTGRES_USER: thermal
      POSTGRES_PASSWORD: thermal_secret
      POSTGRES_DB: thermal_routing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermal -d thermal_routing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
